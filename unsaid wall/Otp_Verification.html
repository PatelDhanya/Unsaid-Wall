    <!-- OTP Input Logic & Timer -->
    <script>
      const inputs = document.querySelectorAll(".otp-input");
      const resendBtn = document.getElementById("resend-btn");
      const timerDisplay = document.getElementById("timer");
      let timeLeft = 45;

      // Auto-focus and backspace logic
      inputs.forEach((input, index) => {
        input.addEventListener("input", (e) => {
          if (e.target.value.length === 1 && index < inputs.length - 1) {
            inputs[index + 1].focus();
          }
        });

        input.addEventListener("keydown", (e) => {
          if (e.key === "Backspace" && !e.target.value && index > 0) {
            inputs[index - 1].focus();
          }
        });

        // Restrict to numbers only
        input.addEventListener("keypress", (e) => {
          if (!/[0-9]/.test(e.key)) {
            e.preventDefault();
          }
        });
      });

      // Timer Logic
      const countdown = setInterval(() => {
        timeLeft--;
        const minutes = Math.floor(timeLeft / 60);
        const seconds = timeLeft % 60;
        timerDisplay.textContent = `${minutes}:${seconds < 10 ? "0" : ""}${seconds}`;

        if (timeLeft <= 0) {
          clearInterval(countdown);
          resendBtn.disabled = false;
          resendBtn.classList.remove("opacity-60", "cursor-not-allowed");
          resendBtn.classList.add(
            "text-primary",
            "opacity-100",
            "cursor-pointer",
            "hover:bg-primary-container/20",
            "rounded-lg",
          );
          resendBtn.innerHTML =
            '<span>Resend Code</span> <span class="material-symbols-outlined text-[16px]" data-icon="refresh">refresh</span>';
        }
      }, 1000);

      // Form Submission
      document.getElementById("otp-form").addEventListener("submit", (e) => {
        e.preventDefault();
        const code = Array.from(inputs)
          .map((i) => i.value)
          .join("");
        if (code.length === 6) {
          console.log("Verifying code:", code);
          // Visual feedback
          const btn = e.submitter;
          btn.innerHTML =
            '<span class="material-symbols-outlined animate-spin" data-icon="progress_activity">progress_activity</span>';
          btn.classList.add("opacity-80");
          setTimeout(() => {
            alert("Phone verified successfully!");
            location.reload();
          }, 1500);
        }
      });
    </script>
