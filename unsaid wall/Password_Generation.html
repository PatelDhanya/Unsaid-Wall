<!doctype html>
<html class="light" lang="en" style="">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Secure Your Account | Unsaid Wall</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Literata:ital,wght@0,400..900;1,400..900&amp;family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }

      .glass-card {
        background: rgba(223, 255, 222, 0.8);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
      }

      .strength-bar {
        transition:
          width 0.4s cubic-bezier(0.4, 0, 0.2, 1),
          background-color 0.3s ease;
      }

      .check-item {
        transition:
          color 0.3s ease,
          transform 0.2s ease;
      }

      .check-item.met {
        color: #006b00;
      }

      .check-item.met .material-symbols-outlined {
        font-variation-settings: "FILL" 1;
      }
    </style>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-dim": "#a4e3ac",
              "on-secondary-fixed-variant": "#006a30",
              "secondary-dim": "#005d29",
              "on-tertiary-fixed": "#003d41",
              "on-primary-fixed-variant": "#006300",
              "on-primary-fixed": "#004200",
              "inverse-primary": "#7df168",
              "surface-variant": "#b0ebb6",
              "on-secondary-container": "#005f2a",
              secondary: "#006a30",
              "on-secondary": "#ceffd1",
              "surface-container-high": "#b9f0be",
              "on-error": "#ffefec",
              "on-background": "#10361a",
              "primary-container": "#7df168",
              surface: "#dfffde",
              "surface-container": "#c1f5c5",
              "on-secondary-fixed": "#004a1f",
              "error-dim": "#b92902",
              "outline-variant": "#8eb792",
              "error-container": "#f95630",
              "surface-bright": "#dfffde",
              "inverse-on-surface": "#7ea782",
              "secondary-fixed": "#8ef9a4",
              outline: "#59805e",
              "tertiary-container": "#05ebf9",
              "secondary-fixed-dim": "#80eb97",
              "secondary-container": "#8ef9a4",
              tertiary: "#00666c",
              "surface-tint": "#006b00",
              "on-surface-variant": "#3e6444",
              "on-primary-container": "#005800",
              "tertiary-fixed": "#05ebf9",
              "primary-fixed": "#7df168",
              "on-primary": "#d3ffc2",
              "on-tertiary-fixed-variant": "#005c62",
              "primary-fixed-dim": "#6fe25b",
              "tertiary-fixed-dim": "#00dbe8",
              "surface-container-low": "#cdfdd0",
              primary: "#006b00",
              "on-tertiary-container": "#005257",
              "surface-container-lowest": "#ffffff",
              "on-error-container": "#520c00",
              "primary-dim": "#005d00",
              "inverse-surface": "#001204",
              "surface-container-highest": "#b0ebb6",
              error: "#b02500",
              "on-surface": "#10361a",
              "tertiary-dim": "#00595e",
              "on-tertiary": "#cefbff",
              background: "#dfffde",
            },
            borderRadius: {
              DEFAULT: "1rem",
              lg: "2rem",
              xl: "3rem",
              full: "9999px",
            },
            spacing: {
              gutter: "16px",
              "container-padding": "24px",
              "section-gap": "48px",
              unit: "8px",
            },
            fontFamily: {
              "display-lg-mobile": ["Literata"],
              "body-lg": ["Plus Jakarta Sans"],
              "label-sm": ["Plus Jakarta Sans"],
              "headline-md": ["Literata"],
              "body-md": ["Plus Jakarta Sans"],
              "display-lg": ["Literata"],
            },
            fontSize: {
              "display-lg-mobile": [
                "32px",
                {
                  lineHeight: "40px",
                  letterSpacing: "-0.02em",
                  fontWeight: "600",
                },
              ],
              "body-lg": ["18px", { lineHeight: "28px", fontWeight: "400" }],
              "label-sm": [
                "13px",
                {
                  lineHeight: "18px",
                  letterSpacing: "0.04em",
                  fontWeight: "600",
                },
              ],
              "headline-md": [
                "28px",
                { lineHeight: "36px", fontWeight: "500" },
              ],
              "body-md": ["16px", { lineHeight: "24px", fontWeight: "400" }],
              "display-lg": [
                "40px",
                {
                  lineHeight: "52px",
                  letterSpacing: "-0.02em",
                  fontWeight: "600",
                },
              ],
            },
          },
        },
      };
    </script>
  </head>

  <body
    class="bg-background text-on-background font-body-md min-h-screen flex flex-col relative overflow-x-hidden"
  >
    <!-- Atmospheric Background Shader -->
    <div class="fixed inset-0 -z-10 opacity-40"></div>
    <!-- Header Section (Transactional - No Shell Nav) -->
    <header
      class="fixed top-0 w-full z-50 flex justify-center items-center h-20 px-container-padding"
    >
      <div class="flex items-center gap-2">
        <span class="material-symbols-outlined text-primary text-3xl">spa</span>
        <span
          class="font-display-lg-mobile text-display-lg-mobile text-primary tracking-tight"
          >Unsaid Wall</span
        >
      </div>
    </header>
    <!-- Main Content Canvas -->
    <main
      class="flex-grow flex items-center justify-center pt-24 pb-12 px-container-padding"
    >
      <div class="w-full max-w-[480px]">
        <!-- Focused Interaction Card -->
        <div
          class="glass-card rounded-lg p-8 md:p-10 border border-outline-variant/20 shadow-sm shadow-primary/5"
        >
          <div class="mb-8 text-center">
            <h1
              class="font-headline-md text-headline-md-mobile text-on-surface mb-2"
            >
              Secure your account
            </h1>
            <p class="font-body-md text-on-surface-variant opacity-80">
              Create a password to keep your unsaid words safe
            </p>
          </div>
          <form class="space-y-6" onsubmit="return false;">
            <!-- New Password Field -->
            <div class="space-y-2">
              <label
                class="block font-label-sm text-on-surface-variant ml-1"
                for="password"
                >New Password</label
              >
              <div class="relative group">
                <input
                  autocomplete="new-password"
                  class="w-full bg-surface-container-lowest/50 border border-outline-variant focus:border-primary focus:ring-4 focus:ring-primary/10 rounded-DEFAULT py-3.5 px-4 outline-none transition-all placeholder:text-outline/50"
                  id="password"
                  placeholder="••••••••"
                  type="password"
                />
                <button
                  class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors focus:outline-none"
                  onclick="toggleVisibility('password')"
                  type="button"
                >
                  <span class="material-symbols-outlined" id="eye-password"
                    >visibility</span
                  >
                </button>
              </div>
            </div>
            <!-- Password Strength Indicator -->
            <div class="space-y-3">
              <div
                class="h-1.5 w-full bg-surface-container rounded-full overflow-hidden"
              >
                <div
                  class="strength-bar h-full w-0 bg-error"
                  id="strength-meter"
                ></div>
              </div>
              <div class="grid grid-cols-2 gap-x-4 gap-y-2">
                <div
                  class="check-item flex items-center gap-2 text-label-sm font-label-sm text-on-surface-variant/60"
                  id="check-length"
                >
                  <span class="material-symbols-outlined text-[18px]"
                    >check_circle</span
                  >
                  8+ characters
                </div>
                <div
                  class="check-item flex items-center gap-2 text-label-sm font-label-sm text-on-surface-variant/60"
                  id="check-number"
                >
                  <span class="material-symbols-outlined text-[18px]"
                    >check_circle</span
                  >
                  One number
                </div>
                <div
                  class="check-item flex items-center gap-2 text-label-sm font-label-sm text-on-surface-variant/60"
                  id="check-symbol"
                >
                  <span class="material-symbols-outlined text-[18px]"
                    >check_circle</span
                  >
                  One symbol
                </div>
                <div
                  class="check-item flex items-center gap-2 text-label-sm font-label-sm text-on-surface-variant/60"
                  id="check-match"
                >
                  <span class="material-symbols-outlined text-[18px]"
                    >check_circle</span
                  >
                  Passwords match
                </div>
              </div>
            </div>
            <!-- Confirm Password Field -->
            <div class="space-y-2">
              <label
                class="block font-label-sm text-on-surface-variant ml-1"
                for="confirm-password"
                >Confirm Password</label
              >
              <div class="relative">
                <input
                  autocomplete="new-password"
                  class="w-full bg-surface-container-lowest/50 border border-outline-variant focus:border-primary focus:ring-4 focus:ring-primary/10 rounded-DEFAULT py-3.5 px-4 outline-none transition-all placeholder:text-outline/50"
                  id="confirm-password"
                  placeholder="••••••••"
                  type="password"
                />
                <button
                  class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors focus:outline-none"
                  onclick="toggleVisibility('confirm-password')"
                  type="button"
                >
                  <span
                    class="material-symbols-outlined"
                    id="eye-confirm-password"
                    >visibility</span
                  >
                </button>
              </div>
            </div>
            <a
              href="Identity.html"
              class="block w-full bg-primary hover:bg-primary-dim text-on-primary font-bold py-4 rounded-full shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all duration-200 mt-4 text-center"
            >
              Set Password
            </a>
          </form>
        </div>
        <div
          class="mt-8 flex justify-center items-center gap-4 text-on-surface-variant/60"
        >
          <div class="h-px w-8 bg-outline-variant/30"></div>
          <span class="font-label-sm text-label-sm">Safe &amp; Private</span>
          <div class="h-px w-8 bg-outline-variant/30"></div>
        </div>
      </div>
    </main>
    <!-- Footer Component -->

    <script>
      function toggleVisibility(id) {
        const input = document.getElementById(id);
        const icon = document.getElementById("eye-" + id);
        if (input.type === "password") {
          input.type = "text";
          icon.innerText = "visibility_off";
        } else {
          input.type = "password";
          icon.innerText = "visibility";
        }
      }

      const passwordInput = document.getElementById("password");
      const confirmInput = document.getElementById("confirm-password");
      const meter = document.getElementById("strength-meter");

      const checks = {
        length: document.getElementById("check-length"),
        number: document.getElementById("check-number"),
        symbol: document.getElementById("check-symbol"),
        match: document.getElementById("check-match"),
      };

      function validate() {
        const val = passwordInput.value;
        const confirmVal = confirmInput.value;

        let score = 0;

        // Check Length
        if (val.length >= 8) {
          checks.length.classList.add("met");
          score += 33;
        } else {
          checks.length.classList.remove("met");
        }

        // Check Number
        if (/\d/.test(val)) {
          checks.number.classList.add("met");
          score += 33;
        } else {
          checks.number.classList.remove("met");
        }

        // Check Symbol
        if (/[!@#$%^&*(),.?":{}|<>]/.test(val)) {
          checks.symbol.classList.add("met");
          score += 34;
        } else {
          checks.symbol.classList.remove("met");
        }

        // Check Match
        if (val === confirmVal && val.length > 0) {
          checks.match.classList.add("met");
        } else {
          checks.match.classList.remove("met");
        }

        // Update Meter UI
        meter.style.width = score + "%";
        if (score <= 33) {
          meter.className = "strength-bar h-full bg-error";
        } else if (score <= 66) {
          meter.className = "strength-bar h-full bg-tertiary-container";
        } else {
          meter.className = "strength-bar h-full bg-primary";
        }
      }

      passwordInput.addEventListener("input", validate);
      confirmInput.addEventListener("input", validate);
    </script>
  </body>
</html>
